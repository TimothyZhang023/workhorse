name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build
      - name: Archive dist
        run: tar -czf workhorse-dist.tar.gz dist
      - uses: actions/upload-artifact@v4
        with:
          name: workhorse-dist
          path: workhorse-dist.tar.gz
