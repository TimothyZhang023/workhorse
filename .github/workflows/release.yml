name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: install project dependencies
        run: npm ci

      - name: build sidecar
        run: node scripts/build-sidecar.mjs

      # 跳过所有证书导入和 API Key 准备步骤

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不再传递 APPLE_CERTIFICATE 等环境变量，Tauri 会自动跳过签名
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'workhorse v__VERSION__'
          releaseBody: |
            See the assets below for the latest installers.

            ⚠️ macOS note: This is an UNSIGNED build. You must run:
            xattr -rd com.apple.quarantine /Applications/workhorse.app
            to open it.

            A helper installer script is available:
            ./scripts/install-macos-app.sh <workhorse.dmg>
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
